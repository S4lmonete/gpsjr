services:
  mysql:
    image: mysql:8.4
    container_name: gpsjr-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: gpsjr
      MYSQL_USER: gpsjr
      MYSQL_PASSWORD: gpsjr
      MYSQL_ROOT_PASSWORD: gpsjr-root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:

